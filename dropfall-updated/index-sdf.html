<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropfall: SDF Arena Edition</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff00ff;
            --accent-color: #ffff00;
            --bg-dark: #000000;
            --text-primary: #00ffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            overflow: hidden;
            font-size: 14px;
        }
        
        #app {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* HUD */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            font-size: 16px;
            color: var(--text-primary);
            text-shadow: 0 0 10px var(--text-primary);
        }
        
        .hud-section {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--primary-color);
            padding: 10px;
            margin: 5px 0;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .player-info {
            display: inline-block;
            margin: 0 10px;
            min-width: 250px;
        }
        
        .player-name {
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-bar {
            width: 100%;
            height: 15px;
            background: #1a1a1a;
            border: 1px solid var(--primary-color);
            position: relative;
            margin: 3px 0;
        }
        
        .stat-fill {
            height: 100%;
            background: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }
        
        .stat-label {
            position: absolute;
            left: 5px;
            top: 0;
            line-height: 15px;
            font-size: 12px;
            color: var(--bg-dark);
            font-weight: bold;
        }
        
        /* Menu */
        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 500;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--primary-color);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #menu h1 {
            font-size: 3em;
            color: var(--secondary-color);
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--secondary-color);
        }
        
        #menu .subtitle {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.2em;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        button {
            background: rgba(0, 255, 255, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px var(--primary-color);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        /* Settings Panel */
        #settings {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 300px;
            max-height: 80vh;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary-color);
            padding: 15px;
            overflow-y: auto;
            z-index: 200;
            display: none;
        }
        
        #settings.visible {
            display: block;
        }
        
        .setting-group {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .setting-label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--primary-color);
        }
        
        .setting-value {
            display: inline-block;
            margin-left: 5px;
            color: var(--accent-color);
        }
        
        input[type="range"] {
            width: 100%;
            height: 5px;
            background: #1a1a1a;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: var(--primary-color);
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-color);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: var(--primary-color);
            cursor: pointer;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 10px var(--primary-color);
        }
        
        /* Notifications */
        #notifications {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 300;
        }
        
        .notification {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px;
            margin-top: 10px;
            border-radius: 3px;
            box-shadow: 0 0 15px var(--primary-color);
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(-300px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Countdown */
        #countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8em;
            color: var(--secondary-color);
            text-shadow: 0 0 30px var(--secondary-color);
            z-index: 400;
            display: none;
            animation: pulse 1s infinite;
        }
        
        #countdown.visible {
            display: block;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }
        
        /* Boost Bar */
        .boost-bar-container {
            position: fixed;
            bottom: 30px;
            width: 200px;
            z-index: 100;
        }
        
        #boost-p1 {
            left: 30px;
        }
        
        #boost-p2 {
            right: 30px;
        }
        
        .boost-label {
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .boost-value {
            color: var(--accent-color);
        }
        
        /* Powerup notifications */
        #powerup-notifications {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 250;
            pointer-events: none;
        }
        
        .powerup-notification {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid;
            padding: 10px 20px;
            margin: 5px 0;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            animation: fadeInOut 3s ease-out forwards;
            box-shadow: 0 0 20px;
            border-radius: 3px;
        }
        
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <!-- HUD -->
    <div id="hud" style="display: flex; justify-content: space-between;">
        <div class="player-info" style="color: #ff0000;">
            <div class="player-name">PLAYER 1</div>
            <div class="stat-bar">
                <div class="stat-fill" id="p1-health" style="width: 100%;"></div>
                <div class="stat-label">HP</div>
            </div>
            <div class="stat-bar">
                <div class="stat-fill" id="p1-boost" style="width: 100%; background: #ffff00;"></div>
                <div class="stat-label">BOOST</div>
            </div>
        </div>
        
        <div style="flex: 1; text-align: center;">
            <div id="score-display" style="font-size: 1.5em; color: var(--accent-color);">0 - 0</div>
            <div id="timer" style="font-size: 1.2em; color: var(--primary-color);">0:00</div>
        </div>
        
        <div class="player-info" style="color: #0000ff;">
            <div class="player-name">PLAYER 2</div>
            <div class="stat-bar">
                <div class="stat-fill" id="p2-health" style="width: 100%;"></div>
                <div class="stat-label">HP</div>
            </div>
            <div class="stat-bar">
                <div class="stat-fill" id="p2-boost" style="width: 100%; background: #ffff00;"></div>
                <div class="stat-label">BOOST</div>
            </div>
        </div>
    </div>
    
    <!-- Menu -->
    <div id="menu">
        <h1>DROPFALL</h1>
        <div class="subtitle">SDF Ray-Marching Edition</div>
        <p>A cyber arena duel powered by Signed Distance Fields</p>
        <div class="button-group">
            <button id="start-btn">START GAME</button>
            <button id="settings-btn">SETTINGS</button>
        </div>
        <p style="margin-top: 20px; font-size: 0.9em; color: var(--primary-color);">
            P1: WASD + SHIFT | P2: ARROWS + SHIFT
        </p>
    </div>
    
    <!-- Settings Panel -->
    <div id="settings">
        <h3 style="margin-bottom: 15px; color: var(--secondary-color);">SETTINGS</h3>
        
        <div class="setting-group">
            <label class="setting-label">
                Arena Size <span class="setting-value" id="arena-size-val">4</span>
            </label>
            <input type="range" id="arena-size" min="2" max="6" value="4" step="1">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">
                Sphere Size <span class="setting-value" id="sphere-size-val">2.0</span>
            </label>
            <input type="range" id="sphere-size" min="1" max="3" value="2" step="0.1">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">
                Acceleration <span class="setting-value" id="sphere-accel-val">2000</span>
            </label>
            <input type="range" id="sphere-accel" min="1000" max="3000" value="2000" step="100">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">
                Destruction Rate <span class="setting-value" id="destruction-rate-val">3.0</span>
            </label>
            <input type="range" id="destruction-rate" min="1" max="5" value="3" step="0.1">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">
                Music Volume <span class="setting-value" id="music-volume-val">0.6</span>
            </label>
            <input type="range" id="music-volume" min="0" max="1" value="0.6" step="0.1">
        </div>
        
        <button id="close-settings-btn" style="width: 100%; margin-top: 15px;">CLOSE</button>
    </div>
    
    <!-- Countdown -->
    <div id="countdown"></div>
    
    <!-- Notifications -->
    <div id="notifications"></div>
    <div id="powerup-notifications"></div>
    
    <!-- Boost Bars -->
    <div id="boost-p1" class="boost-bar-container">
        <div class="boost-label">BOOST P1</div>
        <div class="stat-bar">
            <div class="stat-fill" id="p1-boost-bar" style="width: 100%;"></div>
        </div>
    </div>
    
    <div id="boost-p2" class="boost-bar-container">
        <div class="boost-label">BOOST P2</div>
        <div class="stat-bar">
            <div class="stat-fill" id="p2-boost-bar" style="width: 100%;"></div>
        </div>
    </div>
    
    <!-- Game Scripts -->
    <script type="module" src="/src/sdf/main.js"></script>
</body>
</html>
